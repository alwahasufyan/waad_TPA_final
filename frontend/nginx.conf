# ── Rate Limiting Zones ─────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api:10m    rate=20r/s;
limit_req_zone  $binary_remote_addr zone=auth:10m   rate=5r/m;

# ── HTTP to HTTPS Redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost; # Replace with your domain if needed

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── MAIN HTTPS SERVER ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name localhost; # Replace with your domain if needed

    root /usr/share/nginx/html;
    index index.html;

    # SSL Configuration (Update paths to match your certificate location)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    
    # FIXED: Added 'unsafe-eval' and 'blob:' to allow libraries that require it
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; worker-src 'self' blob:;" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 🔥 IMPORTANT: Proxy API to backend container
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: 60s for normal requests
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        send_timeout          60s;

        # Upload limit aligned with Spring multipart config (60MB)
        client_max_body_size 60M;
    }

    # Auth endpoints: strict rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://backend:8080/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}