name: waad-prod

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tba_waad_system}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - waad_prod_pgdata:/var/lib/postgresql/data
    networks:
      - waad_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-postgres}\" -d \"$${POSTGRES_DB:-tba_waad_system}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    container_name: waad-prod-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tba_waad_system
      APP_FRONTEND_URL: https://waadapp.ly
      CORS_ALLOWED_ORIGINS: https://waadapp.ly,https://www.waadapp.ly
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1536m -XX:+UseG1GC -XX:MaxGCPauseMillis=200}

  frontend:
    container_name: waad-prod-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    build:
      args:
        VITE_API_URL: /api/v1

volumes:
  waad_uploads:
    name: waad_prod_uploads
  waad_prod_pgdata:
    name: waad_prod_pgdata
