name: waad-local

services:
  backend:
    container_name: waad-local-backend
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5433/tba_waad_system
      APP_FRONTEND_URL: http://localhost:${FRONTEND_HOST_PORT:-3001}
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_HOST_PORT:-3001},http://127.0.0.1:${FRONTEND_HOST_PORT:-3001},http://localhost:5173,http://127.0.0.1:5173
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    container_name: waad-local-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:80"
    build:
      args:
        VITE_API_URL: /api/v1

volumes:
  waad_uploads:
    name: waad_local_uploads
