name: waad-local

services:
  backend:
    container_name: waad-local-backend
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5433/tba_waad_system
      APP_FRONTEND_URL: http://localhost:${FRONTEND_HOST_PORT:-3001}
      CORS_ALLOWED_ORIGINS: http://localhost:${FRONTEND_HOST_PORT:-3001},http://127.0.0.1:${FRONTEND_HOST_PORT:-3001},http://localhost:5173,http://127.0.0.1:5173
      # Medical Classification Engine — Docker runtime paths. These env
      # overrides take precedence over the DB value so the container never uses
      # the Windows host path. The engine scripts are bind-mounted below (:ro);
      # Python + deps live in the image's venv.
      ENGINE_SCRIPT_DIR: /app/tools/classification-engine
      ENGINE_PYTHON_PATH: /opt/engine-venv/bin/python
      # Optional LAB reference layer (MED-DICT-9): additive, reversible, emits
      # CAT-LAB only. Default off => engine behaviour is identical to baseline.
      # Flip ENGINE_WAAD_LAB_REFERENCE_ENABLED=true in .env to enable.
      ENGINE_WAAD_LAB_REFERENCE_ENABLED: "${ENGINE_WAAD_LAB_REFERENCE_ENABLED:-false}"
      ENGINE_WAAD_LAB_REFERENCE_PATH: /app/tools/classification-engine/waad_lab_reference_layer_v1.json
      BACKUP_DIR: /app/backups/local1
      BACKUP_LOCAL_1_HOST: ${BACKUP_LOCAL_1_HOST:-D:/waad_backups}
      BACKUP_LOCAL_1_CONTAINER: /app/backups/local1
    volumes:
      # Bind-mount the engine so scripts can be edited without rebuilding.
      - ./tools/classification-engine:/app/tools/classification-engine:ro
      # Local backups are written outside the Git working tree and preserved on the host.
      - ${BACKUP_LOCAL_1_HOST:-D:/waad_backups}:/app/backups/local1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    container_name: waad-local-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:80"
    build:
      args:
        VITE_API_URL: /api/v1

volumes:
  waad_uploads:
    name: waad_local_uploads
